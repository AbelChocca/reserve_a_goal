version: '3.8'

services:
  db:
    image: postgres:15
    ports:
      - '5432:5432'
    container_name: space_db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  nest:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: space_backend
    environment:
      CHOKIDAR_USEPOLLING: 'true'
    env_file:
      - .env
    ports:
      - '4000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    command: pnpm run start:dev

volumes:
  postgres_data:
